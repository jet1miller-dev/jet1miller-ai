schedule:
  timezone: Australia/Brisbane
  hour: 7
  minute: 0

defaults:
  au_max: 3
  global_max: 2
  excerpt_max_chars: 130
  max_age_hours: 36
  history_days: 14
  link_label: Read
  fallback_min_items: 2

blocklist:
  - celebrity
  - horoscope
  - rumour
  - rumor
  - kardashian
  - reality tv
  - listicle
  - podcast
  - newsletter
  - live blog
  - free app
  - explainer
  - quiz
  - roundup

topics:
  - id: finance_markets
    name: "Finance — Markets & macro"
    regions: [au, global]
    au_feeds:
      - abc_business
      - rba_media
      - livewire_markets
      - macrobusiness
      - rba_speeches
    global_feeds:
      - reuters_business
      - ap_business
      - marketwatch_top
      - ft_markets
    au_queries:
      - "RBA interest rates Australia"
      - "ASX Australian shares market"
      - "AUD dollar exchange rate"
    global_queries:
      - "Federal Reserve interest rates global economy"
      - "China economy trade Australia"
      - "global macro inflation recession"
      - "S&P 500 US economy impact Australia trade"
      - "Federal Reserve rate decision AUD impact"
      - "US China trade tariffs Australia"

  - id: finance_personal
    name: "Finance — Personal"
    regions: [au, global]
    au_feeds:
      - abc_business
      - macrobusiness
      - domain_news
    global_feeds: []
    au_queries:
      - "Australian mortgage rates housing affordability"
      - "superannuation Australia changes"
      - "cost of living Australia"
    global_queries:
      - "personal finance investing"

  - id: property
    name: Property
    regions: [au, global]
    au_feeds:
      - domain_news
      - urban_developer
      - property_council
    global_feeds:
      - reuters_business
    au_queries:
      - "Brisbane property market Gold Coast"
      - "Queensland housing prices development"
      - "Queensland planning legislation zoning ruling"
    global_queries:
      - "global housing market rates"

  - id: property_dev
    name: Property development
    regions: [au, global]
    au_feeds:
      - urban_developer
      - property_council
      - hia_news
      - domain_news
      - planning_qld
      - bcc_news
    global_feeds: []
    au_queries:
      - "Brisbane Gold Coast DA approval development"
      - "Queensland planning legislation zoning changes"
      - "Queensland planning legislation amendment"
      - "Queensland development approval major project"
    global_queries:
      - "commercial property development construction"

  - id: ai
    name: AI
    max_items: 3
    feeds:
      - verge_ai
      - ars_technica
      - techcrunch_ai
      - mit_tech_review
    queries:
      - "artificial intelligence OpenAI Anthropic"
      - "AI coding tools developer"
      - "large language model release"
      - "AI model release announced GPT Claude Gemini Grok"
      - "AI breakthrough major announcement 2025"
    include_keywords:
      - "model release"
      - "new model"
      - "launches"
      - "announced"
      - "GPT"
      - "Claude"
      - "Gemini"
      - "Grok"
      - "o3"
      - "reasoning model"


  - id: politics
    name: Australian politics
    subsections:
      au_national:
        label: National
        max: 2
        feeds:
          - abc_politics
          - the_conversation_au
        queries:
          - "Australian federal politics parliament"
      au_qld:
        label: Queensland
        max: 2
        feeds:
          - qld_gov_news
          - abc_qld
        queries:
          - "Queensland politics government legislation"
          - "Queensland budget policy announcement"
      global_major:
        label: "Global (major only)"
        max: 2
        locale: global
        feeds: []
        queries:
          - "world politics breaking"
        include_keywords:
          - election
          - war
          - sanctions
          - NATO
          - "United Nations"
          - G7
          - summit
          - invasion
          - ceasefire

  - id: ufc
    name: UFC / MMA
    max_items: 3
    feeds:
      - ufc_news
      - mmajunkie
      - mma_fighting
    queries:
      - "UFC fight announced ranked fighter"
      - "UFC main event card confirmed"
      - "UFC fighter released retired stripped title"
    include_keywords:
      - UFC
      - "title fight"
      - championship
      - "main event"
      - ranked
      - "interim title"
      - "No. 1 contender"
      - "title eliminator"
      - contender
      - retirement
      - stripped
      - suspended
      - contract
    exclude_keywords:
      - women
      - women's
      - WMMA
      - female
      - "women's bantamweight"
      - "women's flyweight"
      - "women's strawweight"
      - "pound-for-pound"
      - weigh-in
      - USADA
