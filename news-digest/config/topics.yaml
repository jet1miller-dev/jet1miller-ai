schedule:
  timezone: Australia/Brisbane
  hour: 7
  minute: 0

defaults:
  au_max: 3
  global_max: 2
  excerpt_max_chars: 130
  max_age_hours: 36
  history_days: 14
  link_label: Read
  fallback_min_items: 2

blocklist:
  - celebrity
  - horoscope
  - rumour
  - rumor
  - kardashian
  - reality tv
  - listicle
  - podcast
  - newsletter
  - live blog
  - free app
  - explainer
  - quiz
  - roundup
  - opinion
  - commentary
  - analysis piece

topics:
  - id: finance_markets
    name: "Finance — Markets & macro"
    regions: [au, global]
    au_feeds:
      - rba_media
      - rba_speeches
      - abc_business
      - abs_economy
    global_feeds:
      - reuters_business
      - ap_business
    au_queries:
      - "RBA cash rate decision Australia"
      - "CPI inflation ABS Australia"
      - "ASX Australian sharemarket"
      - "AUD dollar exchange rate"
    global_queries:
      - "US Federal Reserve rate decision impact"
      - "China economy trade Australia"
    exclude_keywords:
      - auction
      - clearance rate
      - first home buyer
      - property market
      - housing market
      - real estate
      - rental market
      - mortgage broker

  - id: finance_personal
    name: "Finance — Personal"
    regions: [au]
    au_feeds:
      - abc_business
      - ato_newsroom
    global_feeds: []
    au_queries:
      - "Australian mortgage rate change banks"
      - "superannuation Australia changes 2025"
      - "ATO tax announcement Australia"
      - "cost of living Australia"
      - "ETF shares index fund investing Australia"
    global_queries: []
    exclude_keywords:
      - auction
      - clearance rate
      - first home buyer
      - property market
      - housing market
      - real estate
      - rental market
      - Iran
      - war
      - conflict
      - invasion
      - missile
      - sovereign capability

  - id: property
    name: "Property & Development"
    regions: [au]
    au_feeds:
      - domain_news
      - rea_property_news
      - reiq_news
      - smart_property_investment
      - urban_developer
      - property_council
      - hia_news
      - planning_qld
      - bcc_news
    global_feeds: []
    au_queries:
      - "Brisbane SEQ property market prices"
      - "Gold Coast property prices rental"
      - "Queensland rental market vacancy rates"
      - "Brisbane Gold Coast DA approval development"
      - "Queensland planning legislation zoning changes"
      - "Queensland development approval major project"
      - "construction costs Queensland builder"
      - "BCC Brisbane City Council development"
    global_queries: []

  - id: ai
    name: AI
    max_items: 3
    feeds:
      - the_decoder
      - verge_ai
      - techcrunch_ai
    queries:
      - "new AI model release announced"
      - "OpenAI Anthropic Google DeepMind announcement"
      - "GPT Claude Gemini Grok model release"
    include_keywords:
      - "new model"
      - "model release"
      - "launches"
      - "announced"
      - "GPT"
      - "Claude"
      - "Gemini"
      - "Grok"
      - "o3"
      - "OpenAI"
      - "Anthropic"
      - "Google DeepMind"
      - "Meta AI"
      - "reasoning model"
      - "frontier model"

  - id: politics
    name: Australian politics
    subsections:
      au_national:
        label: National
        max: 2
        feeds:
          - abc_politics
          - the_conversation_au
        queries:
          - "Australian federal politics parliament"
      au_qld:
        label: Queensland
        max: 2
        feeds:
          - qld_gov_news
          - abc_qld
        queries:
          - "Queensland politics government legislation"
          - "Queensland budget policy announcement"
      global_major:
        label: "Global (major only)"
        max: 2
        locale: global
        feeds: []
        queries:
          - "world politics breaking"
        include_keywords:
          - election
          - war
          - conflict
          - sanctions
          - NATO
          - "United Nations"
          - G7
          - summit
          - invasion
          - ceasefire
          - Iran
          - Ukraine
          - missile
          - strike
          - troops
          - diplomatic
          - "Middle East"
          - Gaza
          - Israel

  - id: ufc
    name: UFC / MMA
    max_items: 3
    feeds:
      - ufc_news
      - mmajunkie
      - mma_fighting
    queries:
      - "UFC fight announced ranked fighter"
      - "UFC main event card confirmed"
      - "UFC fighter released retired stripped title"
    include_keywords:
      - UFC
      - "title fight"
      - championship
      - "main event"
      - ranked
      - "interim title"
      - "No. 1 contender"
      - "title eliminator"
      - contender
      - retirement
      - stripped
      - suspended
      - contract
    exclude_keywords:
      - women
      - women's
      - WMMA
      - female
      - "women's bantamweight"
      - "women's flyweight"
      - "women's strawweight"
      - "pound-for-pound"
      - weigh-in
      - USADA
