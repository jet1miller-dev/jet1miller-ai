schedule:
  timezone: Australia/Brisbane
  hour: 7
  minute: 0

defaults:
  au_max: 4
  global_max: 3
  excerpt_max_chars: 130
  max_age_hours: 36
  history_days: 14
  link_label: Read
  fallback_min_items: 2

blocklist:
  - celebrity
  - horoscope
  - rumour
  - rumor
  - kardashian
  - reality tv
  - listicle
  - podcast
  - newsletter
  - live blog
  - free app
  - explainer
  - quiz
  - roundup
  - opinion
  - commentary
  - analysis piece

topics:
  - id: finance_markets
    name: "Finance — Markets & macro"
    regions: [au, global]
    au_feeds:
      - rba_media
      - rba_speeches
      - abc_business
      - macrobusiness
    global_feeds:
      - marketwatch
      - cnbc_markets
      - wsj_markets
      - yahoo_finance
      - investing_com
    au_queries:
      - "RBA cash rate decision Australia"
      - "CPI inflation ABS Australia"
      - "ASX 200 Australian sharemarket"
      - "AUD dollar exchange rate"
      - "Australian federal budget economic policy"
    global_queries:
      - "S&P 500 market today"
      - "US Federal Reserve rate decision"
      - "China economy trade Australia impact"
      - "global markets stocks rally sell-off"
    exclude_keywords:
      - auction
      - clearance rate
      - first home buyer
      - property market
      - housing market
      - real estate
      - rental market
      - mortgage broker

  - id: finance_personal
    name: "Finance — Personal"
    regions: [au]
    au_feeds:
      - abc_business
      - finder_au
      - motley_fool_au
    global_feeds: []
    au_queries:
      - "Australian mortgage rate change banks"
      - "superannuation Australia changes"
      - "ATO tax announcement Australia"
      - "CGT capital gains tax Australia"
      - "cost of living Australia"
      - "ETF shares index fund investing Australia"
      - "Australian income tax bracket threshold"
    global_queries: []
    exclude_keywords:
      - auction
      - clearance rate
      - first home buyer
      - property market
      - housing market
      - real estate
      - rental market

  - id: property
    name: "Property & Development"
    regions: [au]
    au_feeds:
      - rea_property_news
      - smart_property_investment
      - urban_developer
      - your_investment_property
      - property_update
      - guardian_au_property
      - prd_research
      - propertyology
      - udia_qld
      - fifth_estate
      - brisbane_times
    global_feeds: []
    au_queries:
      # Brisbane / Gold Coast / SEQ market
      - "Brisbane property market prices 2025"
      - "Gold Coast property prices rental market"
      - "SEQ southeast Queensland property development"
      - "Brisbane Gold Coast new development project announced"
      # QLD planning & legislation
      - "Queensland property development legislation planning reform"
      - "Queensland zoning planning approval DA"
      - "QLD government housing development announcement"
      - "Brisbane City Council development application approved"
      # Construction & industry
      - "construction costs Queensland builder shortage"
      - "Queensland rental vacancy rate"
      # Luxury / prestige
      - "luxury prestige property Brisbane Gold Coast sold listed"
      - "Queensland property sold 5 million 7 million 8 million"
      - "prestige home Queensland auction result"
    global_queries: []

  - id: ai
    name: AI
    max_items: 3
    feeds:
      - the_decoder
      - verge_ai
      - techcrunch_ai
    queries:
      - "new AI model release announced"
      - "OpenAI Anthropic Google DeepMind announcement"
      - "GPT Claude Gemini Grok model release"
    include_keywords:
      - "new model"
      - "model release"
      - "launches"
      - "announced"
      - "GPT"
      - "Claude"
      - "Gemini"
      - "Grok"
      - "o3"
      - "OpenAI"
      - "Anthropic"
      - "Google DeepMind"
      - "Meta AI"
      - "reasoning model"
      - "frontier model"

  - id: politics
    name: Australian politics
    subsections:
      au_national:
        label: National
        max: 3
        feeds:
          - abc_politics
          - abc_business
          - guardian_au_politics
          - michael_west
          - the_mandarin
          - sbs_news
        queries:
          - "Australian federal politics parliament"
          - "Australian government policy legislation"
      au_qld:
        label: Queensland
        max: 3
        feeds:
          - qld_gov_news
          - abc_qld
          - brisbane_times_national
          - udia_qld
        queries:
          - "Queensland politics government legislation"
          - "Queensland budget policy announcement"
          - "Queensland Premier cabinet minister"
      global_major:
        label: "Global (major only)"
        max: 2
        locale: global
        feeds: []
        queries:
          - "world politics breaking"
        include_keywords:
          - election
          - war
          - conflict
          - sanctions
          - NATO
          - "United Nations"
          - G7
          - summit
          - invasion
          - ceasefire
          - Iran
          - Ukraine
          - missile
          - strike
          - troops
          - diplomatic
          - "Middle East"
          - Gaza
          - Israel

  - id: ufc
    name: UFC / MMA
    max_items: 4
    feeds:
      - ufc_news
      - mmajunkie
      - sherdog
      - low_kick_mma
      - combat_press
    queries:
      - "UFC fight announced ranked fighter"
      - "UFC main event card confirmed"
      - "UFC fighter released retired stripped title"
      - "UFC title fight championship bout"
    include_keywords:
      - UFC
      - "title fight"
      - championship
      - "main event"
      - ranked
      - "interim title"
      - "No. 1 contender"
      - "title eliminator"
      - contender
      - retirement
      - stripped
      - suspended
      - contract
    exclude_keywords:
      - women
      - women's
      - WMMA
      - female
      - "women's bantamweight"
      - "women's flyweight"
      - "women's strawweight"
      - "pound-for-pound"
      - weigh-in
      - USADA
