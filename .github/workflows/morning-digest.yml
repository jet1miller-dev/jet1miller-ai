name: Morning digest

# Automatic runs: cron-job.org POSTs to workflow_dispatch (see news-digest/README.md).
# No GitHub schedule — avoids unreliable built-in cron timing.
on:
  workflow_dispatch:
    inputs:
      force_run:
        description: Send digest now (skip 6–8 AM Brisbane check)
        type: boolean
        required: false
        default: false
      source:
        description: Trigger source (cron-job, manual)
        type: string
        required: false
        default: manual

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if digest should run now
        id: should_run
        run: |
          echo "Trigger source: ${{ inputs.source }}"
          if [ "${{ inputs.force_run }}" = "true" ]; then
            echo "force_run enabled — sending digest."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=Australia/Brisbane date +%H)
          MIN=$(TZ=Australia/Brisbane date +%M)
          echo "Brisbane time: ${HOUR}:${MIN}"
          # Only send during 6:00–8:59 AM Brisbane (cron-job.org should fire ~07:00).
          if [ "$HOUR" -ge 6 ] && [ "$HOUR" -le 8 ]; then
            echo "Within 6–8 AM Brisbane window — sending digest."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Outside 6–8 AM Brisbane window (hour=$HOUR). Skipping digest."
            echo "To test anytime: re-run with force_run enabled."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.should_run.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.should_run.outputs.run == 'true'
        run: pip install -r news-digest/requirements.txt

      - name: Run morning digest
        if: steps.should_run.outputs.run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DIGEST_TIMEZONE: Australia/Brisbane
        run: python news-digest/digest.py

      - name: Commit sent history
        if: steps.should_run.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-digest/data/sent_history.json
          git diff --staged --quiet && echo "No history changes" || (
            git commit -m "chore: update digest sent history" &&
            git push
          )
