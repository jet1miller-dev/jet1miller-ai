name: Morning digest

on:
  schedule:
    # Target 07:00 Australia/Brisbane (AEST = UTC+10, no DST).
    # 21:00 UTC = 07:00 Brisbane (next day).
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if digest should run now
        id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — always send digest."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=Australia/Brisbane date +%H)
          MIN=$(TZ=Australia/Brisbane date +%M)
          echo "Brisbane time: ${HOUR}:${MIN}"
          # Only send on scheduled runs during the 6:00–8:59 AM Brisbane window.
          if [ "$HOUR" -ge 6 ] && [ "$HOUR" -le 8 ]; then
            echo "Within 6–8 AM Brisbane window — sending digest."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Scheduled job fired outside 6–8 AM Brisbane (hour=$HOUR). Skipping digest."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.should_run.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.should_run.outputs.run == 'true'
        run: pip install -r news-digest/requirements.txt

      - name: Run morning digest
        if: steps.should_run.outputs.run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIGEST_TIMEZONE: Australia/Brisbane
        run: python news-digest/digest.py

      - name: Commit sent history
        if: steps.should_run.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-digest/data/sent_history.json
          git diff --staged --quiet && echo "No history changes" || (
            git commit -m "chore: update digest sent history" &&
            git push
          )
